name: Release APK

# Builds a signed production APK and publishes a GitHub Release whenever
# a tag like v2.0.0 is pushed.
on:
  push:
    tags:
      - '*.*.*'

# Required so the workflow can create the GitHub Release and upload assets.
permissions:
  contents: write

jobs:
  build:
    name: Build & release signed APK
    runs-on: ubuntu-latest

    steps:
      - name: Check out the tagged commit
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter 3.41.6
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.6
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # Generated files are committed, but regenerating guarantees the build
      # matches the current source (Freezed / Riverpod / Drift).
      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      # Recreate the release keystore and key.properties from secrets.
      # android/app/build.gradle reads android/key.properties and resolves
      # storeFile relative to the android/app module directory.
      - name: Restore signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks

      - name: Write key.properties
        env:
          STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          cat > android/key.properties <<EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=upload-keystore.jks
          EOF

      - name: Build release APK
        run: flutter build apk --release

      # Rename so the release asset carries the tag instead of "app-release.apk".
      - name: Rename APK with tag
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk "dist/red_owl-${GITHUB_REF_NAME}.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/red_owl-${{ github.ref_name }}.apk
          generate_release_notes: true
