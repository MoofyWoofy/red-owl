name: Release APK

# Builds a signed production APK and publishes a GitHub Release whenever
# a semver tag like 2.0.0 is pushed.
on:
  push:
    tags:
      - '*.*.*'

# Required so the workflow can create the GitHub Release and upload assets.
permissions:
  contents: write

jobs:
  # Generate a CHANGELOG.md section from the commits since the previous tag
  # and commit it back to main. Runs independently of the APK build.
  changelog:
    name: Update changelog
    runs-on: ubuntu-latest
    steps:
      - name: Check out main with full history
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Generate changelog entry
        shell: bash
        run: |
          set -euo pipefail
          NEW_TAG="${GITHUB_REF_NAME}"

          # Idempotent: if this version is already documented, do nothing.
          if grep -q "^## ${NEW_TAG}$" CHANGELOG.md; then
            echo "CHANGELOG.md already documents ${NEW_TAG}; skipping."
            exit 0
          fi

          # Commits between the previous tag and this one (whole history if first tag).
          PREV_TAG="$(git describe --tags --abbrev=0 "${NEW_TAG}^" 2>/dev/null || true)"
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..${NEW_TAG}"
          else
            RANGE="${NEW_TAG}"
          fi
          echo "Building changelog for ${NEW_TAG} from range '${RANGE}'."

          added=""; changed=""; fixed=""; perf=""; docs=""

          while IFS= read -r subject; do
            [ -z "$subject" ] && continue
            if [[ "$subject" =~ ^([a-zA-Z]+)(\([^\)]*\))?!?:[[:space:]]*(.*)$ ]]; then
              type="${BASH_REMATCH[1],,}"
              desc="${BASH_REMATCH[3]}"
            else
              type="other"
              desc="$subject"
            fi
            desc="${desc^}"   # capitalise first letter
            case "$type" in
              feat)                          added+="- ${desc}"$'\n' ;;
              fix)                           fixed+="- ${desc}"$'\n' ;;
              perf)                          perf+="- ${desc}"$'\n' ;;
              docs)                          docs+="- ${desc}"$'\n' ;;
              refactor|i18n|style|build|other) changed+="- ${desc}"$'\n' ;;
              chore|ci|test)                 : ;;  # internal noise, skipped
              *)                             changed+="- ${desc}"$'\n' ;;
            esac
          done < <(git log --no-merges --pretty=%s "$RANGE")

          section="## ${NEW_TAG}"$'\n'
          have_any=false
          append_group () {
            if [ -n "$2" ]; then
              section+=$'\n'"### $1"$'\n'"$2"
              have_any=true
            fi
          }
          append_group "Added" "$added"
          append_group "Changed" "$changed"
          append_group "Fixed" "$fixed"
          append_group "Performance" "$perf"
          append_group "Documentation" "$docs"
          if [ "$have_any" = false ]; then
            section+=$'\n'"### Changed"$'\n'"- Maintenance and internal updates."$'\n'
          fi

          printf '%s' "$section" > new_section.md

          # Insert the new section directly below the BEGIN_VERSIONS marker.
          awk '
            { print }
            /<!-- BEGIN_VERSIONS -->/ && !done {
              print ""
              while ((getline line < "new_section.md") > 0) print line
              done = 1
            }
          ' CHANGELOG.md > CHANGELOG.tmp
          mv CHANGELOG.tmp CHANGELOG.md
          rm -f new_section.md

      - name: Commit and push changelog
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          if git diff --cached --quiet; then
            echo "No changelog changes to commit."
          else
            git commit -m "docs(changelog): add ${GITHUB_REF_NAME} [skip ci]"
            git push origin HEAD:main
          fi

  build:
    name: Build & release signed APK
    runs-on: ubuntu-latest

    steps:
      - name: Check out the tagged commit
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter 3.41.6
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.6
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # Generated files are committed, but regenerating guarantees the build
      # matches the current source (Freezed / Riverpod / Drift).
      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      # Recreate the release keystore and key.properties from secrets.
      # android/app/build.gradle reads android/key.properties and resolves
      # storeFile relative to the android/app module directory.
      - name: Restore signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks

      - name: Write key.properties
        env:
          STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          cat > android/key.properties <<EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=upload-keystore.jks
          EOF

      - name: Build release APK
        run: flutter build apk --release

      # Rename so the release asset carries the tag instead of "app-release.apk".
      - name: Rename APK with tag
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk "dist/red_owl-${GITHUB_REF_NAME}.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/red_owl-${{ github.ref_name }}.apk
          generate_release_notes: true
